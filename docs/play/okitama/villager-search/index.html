<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>雪の中の村人の子供さがし</title>
<link rel="stylesheet" href="../../engine.css">
<style>
:root {
  --bg: #edf4fb;
  --bg-accent: #d9e9f8;
  --panel: rgba(255, 255, 255, 0.76);
  --panel-border: rgba(116, 146, 182, 0.18);
  --text: #3f5872;
  --muted: rgba(63, 88, 114, 0.66);
  --pink: #f27ca4;
  --green: #a7d8a0;
  --amber: #ffbf54;
  --blue: #9dc4f2;
  --purple: #c4aff3;
  --good: #59a86f;
  --bad: #d35d66;
}
* { box-sizing: border-box; }
html, body { width: 100%; min-height: 100%; margin: 0; }
body {
  font-family: var(--engine-font, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif);
  color: var(--text);
  background:
    radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.86), transparent 20%),
    radial-gradient(circle at 82% 16%, rgba(214, 234, 255, 0.56), transparent 18%),
    radial-gradient(circle at 50% 100%, rgba(139, 187, 232, 0.24), transparent 34%),
    linear-gradient(180deg, #f7fbff 0%, #edf5fc 46%, #e3eef8 100%);
  overflow: hidden;
}
main {
  width: 100%;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto auto auto auto auto;
  align-content: start;
  gap: 8px;
  padding: 12px 12px 10px;
}
.title-line {
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto -2px;
  text-align: center;
  font-size: clamp(1.12rem, 3vw, 1.5rem);
  font-weight: 800;
  letter-spacing: 0.06em;
  color: #355b78;
  text-shadow: 0 1px 0 rgba(255,255,255,0.85);
}
.top-note {
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
  color: rgba(53, 91, 120, 0.74);
  font-size: 0.92rem;
  line-height: 1.5;
  padding: 0 2px;
}
.shell {
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
}
.icon-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.72);
  color: var(--text);
  box-shadow: 0 8px 18px rgba(121, 98, 92, 0.12);
  font-size: 1.05rem;
  font-weight: 700;
}
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: nowrap;
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
}
.hud-center {
  flex: 1 1 auto;
  display: flex;
  justify-content: center;
  min-width: 0;
}
.hud-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.music-btn {
  display: none;
}
.hud-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.84);
  border: 1px solid rgba(169, 127, 119, 0.10);
  box-shadow: 0 10px 24px rgba(130, 98, 90, 0.10);
  font-size: 0.84rem;
}
.hud-pill strong {
  font-weight: 800;
}
.hearts {
  letter-spacing: 0.15em;
  color: #f06d78;
  font-size: 1.02rem;
}
.rules {
  display: flex;
  justify-content: center;
  gap: 8px;
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
}
.rule {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 7px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(169, 127, 119, 0.08);
  color: var(--muted);
  font-size: 0.82rem;
  box-shadow: 0 8px 18px rgba(130, 98, 90, 0.08);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rule.active {
  color: var(--text);
  border-color: rgba(94, 64, 57, 0.24);
  box-shadow: inset 0 0 0 1px rgba(94, 64, 57, 0.08), 0 10px 18px rgba(130, 98, 90, 0.12);
}
.stage {
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-self: start;
}
.board-shell {
  position: relative;
  padding: 14px;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,251,255,0.92));
  box-shadow: 0 24px 50px rgba(150, 112, 102, 0.12);
  border: 1px solid rgba(154, 177, 201, 0.18);
}
canvas {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1 / 1;
  touch-action: none;
  cursor: pointer;
  border-radius: 22px;
  background: #13253f;
}
.overlay {
  position: absolute;
  inset: 14px;
  display: grid;
  place-items: center;
  border-radius: 22px;
  background: rgba(12, 22, 38, 0.30);
  backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.overlay-card {
  padding: 18px 22px;
  border-radius: 24px;
  background: rgba(255,255,255,0.96);
  border: 1px solid rgba(38, 56, 78, 0.10);
  text-align: center;
  box-shadow: 0 16px 36px rgba(130, 98, 90, 0.14);
}
.overlay-card h2 {
  margin: 0 0 6px;
  font-size: 1.55rem;
}
.overlay-card p {
  margin: 0;
  color: var(--muted);
}
.status-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: stretch;
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
}
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  align-items: center;
  justify-content: center;
  width: 100%;
}
button.control {
  appearance: none;
  border: 1px solid rgba(94, 64, 57, 0.12);
  background: rgba(255,255,255,0.80);
  color: var(--text);
  border-radius: 14px;
  padding: 10px 14px;
  font: inherit;
  font-weight: 700;
  box-shadow: 0 10px 20px rgba(130, 98, 90, 0.08);
}
button.control.new-layout {
  width: 104px;
  padding: 9px 10px;
  line-height: 1;
}
.status {
  color: var(--muted);
  font-size: 0.91rem;
  line-height: 1.35;
  min-height: 1.4em;
}
.status-below {
  width: min(560px, calc(100vw - 28px));
  margin: 0 auto;
  text-align: center;
}
.status strong {
  color: var(--good);
}
@media (max-width: 640px) {
  body { overflow: hidden; }
  main { min-height: 100vh; }
  .stage {
    gap: 10px;
  }
  .rules { gap: 6px; }
  .rule {
    padding: 6px 10px;
    font-size: 0.74rem;
    border-radius: 12px;
  }
}
</style>
</head>
<body>
<main>
  <div class="title-line">雪の中から、村人を探せ！！</div>
  <div class="top-note">短いタップで×、長押しで村人の子供を表示。やり直しで最初から、手がかりで見つける場所の目安が出ます。</div>
  <div class="hud">
    <div class="hud-pill"><strong>❄️</strong> <span id="progress">0/5</span></div>
    <div class="hud-center">
      <div class="rule active">1区画1人 / 各行各列1人 / 隣接不可</div>
    </div>
    <div class="hud-right">
      <div class="hud-pill hearts" id="hearts">❤️❤️❤️</div>
    </div>
  </div>

  <section class="stage">
    <div class="status-row">
      <div class="controls">
        <button class="control" id="btn-reset">やり直し</button>
        <button class="control" id="btn-check">確認</button>
        <button class="control" id="btn-hint">手がかり</button>
        <button class="control new-layout" id="btn-new">LV変更</button>
      </div>
    </div>

    <div class="board-shell" id="board-shell">
      <canvas id="board"></canvas>
      <div class="overlay" id="clear-overlay">
        <div class="overlay-card">
        <h2>発見</h2>
        <p>すべての村人の子供を見つけました。</p>
        </div>
      </div>
    </div>

    <div class="status status-below" id="status">村人の子供を探しています…</div>
  </section>
</main>

<script type="module">
import init, * as wasm from './wasm/wasm_app.js?v=20260617-18';

const BOARD_SIZES = { 1: 5, 2: 7, 3: 9 };
const PALETTE = ['#eef4fa', '#8fa4b7', '#3d4b58', '#dbe5ee', '#ffffff'];
const VILLAGERS = [
  { kind: 'hood', skin: '#ffe8cb', hair: '#6c4d39', coat: '#d07e62', trim: '#f7f2e8', accent: '#b45a44' },
  { kind: 'cap', skin: '#f7dfc4', hair: '#5c4335', coat: '#8fb2d8', trim: '#f7f4ef', accent: '#5878a7' },
  { kind: 'ponytail', skin: '#f5d9bf', hair: '#8d5c47', coat: '#7cb58f', trim: '#f3efe7', accent: '#4f8a67' },
  { kind: 'beanie', skin: '#ffe1c8', hair: '#4f3b32', coat: '#a67bd2', trim: '#f8f4ef', accent: '#7f5ab2' },
  { kind: 'hood', skin: '#f7ddb9', hair: '#6a4a39', coat: '#d9a45a', trim: '#fff7ea', accent: '#a76a2a' },
  { kind: 'cap', skin: '#ffe0ca', hair: '#634b3d', coat: '#df7680', trim: '#fff4f0', accent: '#b24d59' },
  { kind: 'ponytail', skin: '#f6d7c2', hair: '#7a5a46', coat: '#89bddb', trim: '#f5fbff', accent: '#5b89ad' },
  { kind: 'beanie', skin: '#f4ddbf', hair: '#5f4638', coat: '#8fa87a', trim: '#f7f6ef', accent: '#5f7f56' },
  { kind: 'hood', skin: '#ffe2c8', hair: '#6d4d38', coat: '#b8a1e6', trim: '#f9f6ff', accent: '#7d67b8' },
];

const canvas = document.getElementById('board');
const shell = document.getElementById('board-shell');
const overlay = document.getElementById('clear-overlay');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const heartsEl = document.getElementById('hearts');

let boardSize = 0;
let cellSize = 0;
let originX = 0;
let originY = 0;
let currentBoardSize = BOARD_SIZES[1];
let zonesData = new Uint8Array(currentBoardSize * currentBoardSize);
let solution = new Uint8Array(currentBoardSize * currentBoardSize);
let currentVillager = VILLAGERS[0];
let currentDifficulty = 1;
let marks = new Uint8Array(currentBoardSize * currentBoardSize);
let hovered = null;
let animations = new Map();
let revealCount = 0;
let mistakes = 0;
let running = false;
let solved = false;
let clickTimer = null;
let longPressTimer = null;
let longPressTriggered = false;
let activePointer = null;
let activeCell = null;
let pressStart = null;
let musicPlaying = false;
let musicContext = null;
let musicTimer = null;
let musicStep = 0;
let suppressedAutoMarks = new Set();

const MUSIC_PATTERN = [261.63, 329.63, 392.0, 523.25, 392.0, 329.63];

function zonesAt(row, col) {
  return zonesData[row * currentBoardSize + col];
}

function isAdjacent(aRow, aCol, bRow, bCol) {
  return Math.abs(aRow - bRow) <= 1 && Math.abs(aCol - bCol) <= 1;
}

function validLayout(cols) {
  const usedCols = new Set();
  const usedZones = new Set();
  const positions = [];
  for (let row = 0; row < currentBoardSize; row += 1) {
    const col = cols[row];
    if (col < 0 || col >= currentBoardSize || usedCols.has(col)) return false;
    usedCols.add(col);
    const zone = zonesAt(row, col);
    if (usedZones.has(zone)) return false;
    usedZones.add(zone);
    for (const [pr, pc] of positions) {
      if (isAdjacent(row, col, pr, pc)) return false;
    }
    positions.push([row, col]);
  }
  return true;
}

function enumerateLayouts() {
  const cols = Array.from({ length: currentBoardSize }, (_, i) => i);
  const found = [];
  function permute(i) {
    if (i === cols.length) {
      if (validLayout(cols)) found.push(cols.slice());
      return;
    }
    for (let j = i; j < cols.length; j += 1) {
      [cols[i], cols[j]] = [cols[j], cols[i]];
      permute(i + 1);
      [cols[i], cols[j]] = [cols[j], cols[i]];
    }
  }
  permute(0);
  return found;
}

function syncHud() {
  progressEl.textContent = `${revealCount}/${currentBoardSize}`;
  heartsEl.textContent = '❤️'.repeat(Math.max(0, 3 - mistakes)) + '🖤'.repeat(Math.max(0, mistakes - 3));
}

function stopMusic() {
  if (musicTimer) {
    clearInterval(musicTimer);
    musicTimer = null;
  }
  if (musicContext) {
    musicContext.close().catch(() => {});
    musicContext = null;
  }
  musicStep = 0;
}

async function startMusic() {
  if (!musicContext) {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return false;
    musicContext = new Ctor();
  }
  if (musicContext.state === 'suspended') {
    await musicContext.resume();
  }
  if (musicTimer) return true;
  musicTimer = setInterval(() => {
    if (!musicContext) return;
    const freq = MUSIC_PATTERN[musicStep % MUSIC_PATTERN.length];
    const now = musicContext.currentTime;
    const osc = musicContext.createOscillator();
    const gain = musicContext.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.02, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
    osc.connect(gain);
    gain.connect(musicContext.destination);
    osc.start(now);
    osc.stop(now + 0.46);
    musicStep += 1;
  }, 480);
  return true;
}

function setStatus(text, accent = '') {
  statusEl.innerHTML = accent ? `${text} <strong>${accent}</strong>` : text;
}

function setAnimation(row, col, kind) {
  animations.set(row * currentBoardSize + col, {
    kind,
    started: performance.now(),
    duration: kind === 'error' ? 340 : 260,
  });
}

function clearTimers() {
  if (clickTimer) {
    clearTimeout(clickTimer);
    clickTimer = null;
  }
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
  longPressTriggered = false;
  activePointer = null;
  activeCell = null;
  pressStart = null;
  suppressNextClick = false;
}

function resizeCanvas() {
  const rect = shell.getBoundingClientRect();
  const topbar = document.querySelector('.topbar')?.getBoundingClientRect();
  const hud = document.querySelector('.hud')?.getBoundingClientRect();
  const statusRow = document.querySelector('.status-row')?.getBoundingClientRect();
  const verticalBudget = window.innerHeight
    - (topbar?.height || 0)
    - (hud?.height || 0)
    - (statusRow?.height || 0)
    - 16 * 2
    - 12 * 4;
  const widthBudget = Math.floor(rect.width - 28);
  const heightBudget = Math.floor(verticalBudget - 28);
  const size = Math.max(280, Math.floor(Math.min(widthBudget, heightBudget)));
  canvas.width = size;
  canvas.height = size;
  boardSize = size;
  cellSize = boardSize / currentBoardSize;
  originX = 0;
  originY = 0;
}

function cellAtPoint(x, y) {
  const cx = x - originX;
  const cy = y - originY;
  if (cx < 0 || cy < 0 || cx >= boardSize || cy >= boardSize) return null;
  return {
    row: Math.floor(cy / cellSize),
    col: Math.floor(cx / cellSize),
  };
}

function shade(hex, amount) {
  const n = hex.replace('#', '');
  const r = parseInt(n.slice(0, 2), 16);
  const g = parseInt(n.slice(2, 4), 16);
  const b = parseInt(n.slice(4, 6), 16);
  const clamp = (v) => Math.max(0, Math.min(255, v));
  return `rgb(${clamp(Math.round(r + 255 * amount))}, ${clamp(Math.round(g + 255 * amount))}, ${clamp(Math.round(b + 255 * amount))})`;
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w * 0.5, h * 0.5);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

function drawX(ctx, cx, cy, size) {
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(28, 36, 46, 0.54)';
  ctx.lineWidth = Math.max(3, size * 0.10);
  ctx.beginPath();
  ctx.moveTo(cx - size * 0.26, cy - size * 0.26);
  ctx.lineTo(cx + size * 0.26, cy + size * 0.26);
  ctx.moveTo(cx + size * 0.26, cy - size * 0.26);
  ctx.lineTo(cx - size * 0.26, cy + size * 0.26);
  ctx.stroke();
  ctx.restore();
}

function drawVillager(ctx, cx, cy, size, villager, pulse = 1) {
  const r = size * 0.36 * pulse;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = 'rgba(0,0,0,0.14)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 5;
  ctx.fillStyle = villager.coat;
  ctx.beginPath();
  roundRect(ctx, -r * 0.60, -r * 0.08, r * 1.20, r * 1.05, r * 0.34);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  drawVillagerFace(ctx, villager, r);
  ctx.restore();
}

function drawCircleFace(ctx, faceFill, detailFill, r, accentFill = detailFill) {
  ctx.fillStyle = accentFill;
  ctx.beginPath();
  ctx.arc(-r * 0.22, -r * 0.66, r * 0.08, 0, Math.PI * 2);
  ctx.arc(r * 0.22, -r * 0.66, r * 0.08, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = faceFill;
  ctx.beginPath();
  ctx.arc(0, -r * 0.28, r * 0.50, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = detailFill;
  ctx.beginPath();
  ctx.arc(-r * 0.12, -r * 0.34, r * 0.045, 0, Math.PI * 2);
  ctx.arc(r * 0.12, -r * 0.34, r * 0.045, 0, Math.PI * 2);
  ctx.fill();
}

function drawVillagerFace(ctx, villager, r) {
  const face = villager.skin;
  const hair = villager.hair;
  const accent = villager.accent;
  const trim = villager.trim;

  ctx.fillStyle = hair;
  switch (villager.kind) {
    case 'hood': {
      ctx.beginPath();
      ctx.arc(0, -r * 0.18, r * 0.53, Math.PI * 1.05, Math.PI * 1.95);
      ctx.lineTo(r * 0.30, -r * 0.03);
      ctx.lineTo(r * 0.18, r * 0.30);
      ctx.lineTo(-r * 0.18, r * 0.30);
      ctx.lineTo(-r * 0.30, -r * 0.03);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'cap': {
      ctx.beginPath();
      ctx.arc(0, -r * 0.22, r * 0.46, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = trim;
      roundRect(ctx, -r * 0.42, -r * 0.22, r * 0.84, r * 0.12, r * 0.06);
      ctx.fill();
      break;
    }
    case 'ponytail': {
      ctx.beginPath();
      ctx.arc(-r * 0.20, -r * 0.22, r * 0.22, Math.PI * 1.15, Math.PI * 1.95);
      ctx.arc(r * 0.18, -r * 0.18, r * 0.18, Math.PI * 1.0, Math.PI * 2.0);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(r * 0.46, -r * 0.08, r * 0.12, r * 0.20, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = accent;
      ctx.beginPath();
      ctx.arc(r * 0.50, r * 0.06, r * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'beanie':
    default: {
      ctx.beginPath();
      ctx.arc(0, -r * 0.22, r * 0.47, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = trim;
      ctx.beginPath();
      ctx.arc(0, -r * 0.30, r * 0.16, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
  }

  ctx.fillStyle = trim;
  roundRect(ctx, -r * 0.38, r * 0.12, r * 0.76, r * 0.42, r * 0.12);
  ctx.fill();

  ctx.fillStyle = accent;
  roundRect(ctx, -r * 0.36, r * 0.12, r * 0.72, r * 0.12, r * 0.06);
  ctx.fill();

  ctx.fillStyle = face;
  ctx.beginPath();
  ctx.arc(0, -r * 0.12, r * 0.31, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2f2a27';
  ctx.beginPath();
  ctx.arc(-r * 0.11, -r * 0.16, r * 0.025, 0, Math.PI * 2);
  ctx.arc(r * 0.11, -r * 0.16, r * 0.025, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#8a4c42';
  ctx.lineWidth = Math.max(1.2, r * 0.04);
  ctx.beginPath();
  ctx.arc(0, -r * 0.05, r * 0.08, 0.15, Math.PI - 0.15);
  ctx.stroke();

  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.arc(-r * 0.12, r * 0.34, r * 0.08, 0, Math.PI * 2);
  ctx.arc(r * 0.12, r * 0.34, r * 0.08, 0, Math.PI * 2);
  ctx.fill();
}

function drawBoard(now) {
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#13253f');
  bg.addColorStop(1, '#1e3554');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  const pulse = 0.5 + 0.5 * Math.sin(now * 0.0015);

  for (let r = 0; r < currentBoardSize; r += 1) {
    for (let c = 0; c < currentBoardSize; c += 1) {
      const idx = r * currentBoardSize + c;
      const zone = zonesData[idx];
      const x = c * cellSize;
      const y = r * cellSize;
      const isHover = hovered && hovered.row === r && hovered.col === c;
      const animalPlaced = wasm.animal_puzzle_is_occupied(r, c);
      const autoMarked = !animalPlaced && !suppressedAutoMarks.has(idx) && !wasm.animal_puzzle_is_valid(r, c);
      const xMarked = (marks[idx] === 1 || autoMarked) && !animalPlaced;
      const anim = animations.get(idx);
      let scale = 1;
      let shakeX = 0;
      let shakeY = 0;

      if (anim) {
        const t = Math.min(1, (now - anim.started) / anim.duration);
        if (anim.kind === 'reveal') {
          scale = 0.72 + 0.28 * (1 - Math.pow(1 - t, 3));
          if (t >= 1) animations.delete(idx);
        } else if (anim.kind === 'error') {
          const amp = (1 - t) * 5;
          shakeX = Math.sin(t * 28) * amp;
          shakeY = Math.cos(t * 22) * amp * 0.35;
          if (t >= 1) animations.delete(idx);
        } else if (anim.kind === 'mark') {
          scale = 0.9 + 0.1 * pulse;
          if (t >= 1) animations.delete(idx);
        }
      }

      const base = PALETTE[zone % PALETTE.length];
      const fill = base;

      ctx.save();
      ctx.translate(x + shakeX, y + shakeY);
      ctx.fillStyle = fill;
      roundRect(ctx, 3.5, 3.5, cellSize - 7, cellSize - 7, cellSize * 0.18);
      ctx.fill();

      ctx.lineWidth = isHover ? 2.4 : 1.3;
      ctx.strokeStyle = isHover ? 'rgba(255,255,255,0.94)' : 'rgba(255,255,255,0.12)';
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, 8, 8, cellSize - 16, cellSize - 16, cellSize * 0.14);
      ctx.fill();

      if (xMarked) {
        drawX(ctx, cellSize / 2, cellSize / 2, cellSize * 0.64);
      }

      if (animalPlaced) {
        drawVillager(ctx, cellSize / 2, cellSize / 2, cellSize * 0.88, currentVillager, scale);
      }

      ctx.restore();
    }
  }

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.26)';
  ctx.lineWidth = 4;
  roundRect(ctx, 1.5, 1.5, boardSize - 3, boardSize - 3, 24);
  ctx.stroke();
  ctx.restore();
}

function updateSolvedState() {
  const nextSolved = wasm.animal_puzzle_is_solved();
  if (nextSolved !== solved) {
    solved = nextSolved;
    overlay.classList.toggle('show', solved);
    if (solved) {
      setStatus('見つけた!', 'よくできました');
      window.dispatchEvent(new CustomEvent('villager-search-solved'));
    }
  }
}

function revealCell(row, col, source = 'manual') {
  const idx = row * currentBoardSize + col;
  if (wasm.animal_puzzle_is_occupied(row, col)) {
    return true;
  }
  if (solution[idx] !== 1) {
    mistakes += 1;
    setAnimation(row, col, 'error');
    syncHud();
    setStatus('そこにはいないよ', source === 'hint' ? 'ヒント失敗' : 'もう一度');
    return false;
  }

  const ok = wasm.animal_puzzle_toggle(row, col);
  if (!ok) {
    mistakes += 1;
    setAnimation(row, col, 'error');
    syncHud();
    setStatus('そこにはいないよ', 'もう一度');
    return false;
  }

  marks[idx] = 0;
  suppressedAutoMarks.delete(idx);
  revealCount = wasm.animal_puzzle_count();
  setAnimation(row, col, 'reveal');
  syncHud();
  updateSolvedState();
  setStatus(`村人の子供を見つけた R${row + 1} C${col + 1}`, `${revealCount}/${currentBoardSize}`);
  return true;
}

function toggleLongPressCell(row, col) {
  const idx = row * currentBoardSize + col;
  if (wasm.animal_puzzle_is_occupied(row, col)) {
    const ok = wasm.animal_puzzle_toggle(row, col);
    if (!ok) {
      setStatus('キャンセルできなかった', 'もう一度');
      return false;
    }
    marks[idx] = 0;
    suppressedAutoMarks.add(idx);
    revealCount = wasm.animal_puzzle_count();
    setAnimation(row, col, 'mark');
    syncHud();
    updateSolvedState();
    setStatus(`キャンセルした R${row + 1} C${col + 1}`, `${revealCount}/${currentBoardSize}`);
    return true;
  }

  return revealCell(row, col, 'manual');
}

function toggleMark(row, col) {
  if (wasm.animal_puzzle_is_occupied(row, col)) return;
  const idx = row * currentBoardSize + col;
  if (!wasm.animal_puzzle_is_valid(row, col)) {
    marks[idx] = 0;
    setStatus('そこは自動で×だよ', 'ルール');
    return;
  }
  marks[idx] ^= 1;
  setAnimation(row, col, 'mark');
  setStatus(marks[idx] ? '× をつけた' : '× を消した', '候補');
}

function resetPuzzle() {
  wasm.animal_puzzle_reset();
  marks.fill(0);
  suppressedAutoMarks.clear();
  revealCount = 0;
  mistakes = 0;
  solved = false;
  overlay.classList.remove('show');
  clearTimers();
  syncHud();
  setStatus('もう一度やってみよう', 'やり直し');
}

function applyPuzzleSpec(spec) {
  const nextBoardSize = spec.size ?? currentBoardSize;
  if (nextBoardSize !== currentBoardSize) {
    currentBoardSize = nextBoardSize;
    zonesData = new Uint8Array(currentBoardSize * currentBoardSize);
    solution = new Uint8Array(currentBoardSize * currentBoardSize);
    marks = new Uint8Array(currentBoardSize * currentBoardSize);
    suppressedAutoMarks.clear();
  }
  currentDifficulty = spec.difficulty ?? currentDifficulty;
  zonesData = Uint8Array.from(spec.zones ?? []);
  solution = Uint8Array.from(spec.solution ?? []);
  currentVillager = VILLAGERS[(spec.animal_kind ?? 0) % VILLAGERS.length];

  wasm.animal_puzzle_set_zones(zonesData);
  wasm.animal_puzzle_set_solution(solution);
  resetPuzzle();
}

function loadPuzzle(nextDifficulty = currentDifficulty) {
  const size = BOARD_SIZES[nextDifficulty] ?? currentBoardSize;
  currentBoardSize = size;
  const spec = JSON.parse(wasm.animal_puzzle_generate(size, nextDifficulty));
  applyPuzzleSpec(spec);
  resizeCanvas();
}

function useHint() {
  clearTimers();
  for (let r = 0; r < currentBoardSize; r += 1) {
    for (let c = 0; c < currentBoardSize; c += 1) {
      const idx = r * currentBoardSize + c;
      if (solution[idx] !== 1 || wasm.animal_puzzle_is_occupied(r, c)) continue;
      revealCell(r, c, 'hint');
      return;
    }
  }
  setStatus('もうヒントはないよ', '全部見つけた');
}

function updatePointerPosition(event) {
  const rect = canvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) * (canvas.width / rect.width);
  const y = (event.clientY - rect.top) * (canvas.height / rect.height);
  return cellAtPoint(x, y);
}

function onPointerDown(event) {
  const pos = updatePointerPosition(event);
  if (!pos) return;
  hovered = pos;
  activePointer = event.pointerId;
  activeCell = pos;
  pressStart = performance.now();
  longPressTriggered = false;
  if (longPressTimer) clearTimeout(longPressTimer);
  longPressTimer = setTimeout(() => {
    if (!activeCell || longPressTriggered) return;
    longPressTriggered = true;
    suppressNextClick = true;
    toggleLongPressCell(activeCell.row, activeCell.col);
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
    }
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    activePointer = null;
    activeCell = null;
    pressStart = null;
  }, 450);
  if (canvas.setPointerCapture && event.pointerId !== undefined) {
    try { canvas.setPointerCapture(event.pointerId); } catch (_) {}
  }
}

let suppressNextClick = false;

function onPointerUp(event) {
  if (activePointer !== event.pointerId) return;
  const pos = updatePointerPosition(event) || activeCell;
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
  const held = pressStart ? (performance.now() - pressStart) : 0;
  const didLongPress = longPressTriggered || held >= 420;
  if (!didLongPress && pos) {
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
      revealCell(pos.row, pos.col);
    } else {
      clickTimer = setTimeout(() => {
        toggleMark(pos.row, pos.col);
        clickTimer = null;
      }, 180);
    }
  } else {
    suppressNextClick = true;
  }
  activePointer = null;
  activeCell = null;
  pressStart = null;
  longPressTriggered = false;
}

canvas.addEventListener('pointermove', (event) => {
  hovered = updatePointerPosition(event);
});
canvas.addEventListener('pointerleave', () => {
  hovered = null;
});
canvas.addEventListener('pointercancel', clearTimers);
canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('click', (event) => {
  if (suppressNextClick) {
    suppressNextClick = false;
    event.preventDefault();
    return;
  }
  event.preventDefault();
});
canvas.addEventListener('dblclick', (event) => {
  event.preventDefault();
  const pos = updatePointerPosition(event);
  if (pos) {
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
    }
    revealCell(pos.row, pos.col);
  }
});
canvas.addEventListener('contextmenu', (event) => event.preventDefault());

window.addEventListener('resize', resizeCanvas);

document.getElementById('btn-reset').addEventListener('click', resetPuzzle);
document.getElementById('btn-check').addEventListener('click', () => {
  updateSolvedState();
  setStatus(
    solved ? '見つかりました！' : `${revealCount}/${currentBoardSize} だよ`,
    solved ? 'クリア' : '続けよう',
  );
});
document.getElementById('btn-hint').addEventListener('click', useHint);
document.getElementById('btn-new').addEventListener('click', () => {
  const nextDifficulty = currentDifficulty >= 3 ? 1 : currentDifficulty + 1;
  loadPuzzle(nextDifficulty);
  setStatus('新しい盤面を作ったよ', `レベル ${nextDifficulty} / ${currentBoardSize}×${currentBoardSize}`);
});

async function start() {
  try {
    await init({ module_or_path: './wasm/wasm_app_bg.wasm?v=20260617-18' });
    loadPuzzle(currentDifficulty);
    resizeCanvas();
    revealCount = wasm.animal_puzzle_count();
    syncHud();
    running = true;
    const loop = (now) => {
      if (!running) return;
      drawBoard(now);
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  } catch (err) {
    console.error('Villager search init failed:', err);
    overlay.classList.add('show');
    overlay.querySelector('h2').textContent = 'Load error';
    overlay.querySelector('p').textContent = 'WASM 初期化に失敗しました。';
    setStatus('Failed to load puzzle.', String(err?.message ?? err));
  }
}

start();
</script>
</body>
</html>
